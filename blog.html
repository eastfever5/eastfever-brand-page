    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link

        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css?v=14">

<body>
    <header id="header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo"><a href="/" class="logo-link">EastFever</a></div>
                <nav class="nav-menu">
                    <a href="/" class="nav-link" id="nav-home">Home</a>
                    <a href="/about/" class="nav-link" id="nav-about">About</a>

            </div>
            <div class="lang-selector">
                <button id="lang-btn" class="lang-btn">
                    <span class="lang-icon">🌐</span>
                    <span id="current-lang">한국어</span>
                    <span class="arrow">▾</span>
                </button>
                <ul id="lang-dropdown" class="lang-dropdown hidden">
                    <li data-lang="ko">한국어</li>
                    <li data-lang="en">English</li>
                    <li data-lang="ja">日本語</li>
                </ul>
            </div>

    <main class="blog-container">

            <h1 class="blog-title">Dev Story</h1>
            <p class="blog-subtitle">개발 여정과 기술적 고민, 일상의 기록들</p>
        </div>

        <nav class="category-filter">
            <button class="filter-btn active" data-category="all">전체</button>

    <script src="js/blog.js?v=14"></script>
    <script>
        // Initialize i18n
        document.addEventListener('DOMContentLoaded', async () => {
            const data = await window.dataLoader.load();
            if (data) window.efI18n.updateUI();
        });
