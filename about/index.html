<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - EastFever</title>
    <meta name="description" content="안녕하세요. 이스트피버(EastFever) 앱 개발 공작소를 소개합니다.">
    
    <!-- SEO -->
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://eastfever.com/about/">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://eastfever.com/about/">
    <meta property="og:title" content="About - EastFever">
    <meta property="og:description" content="안녕하세요. 이스트피버(EastFever) 앱 개발 공작소를 소개합니다.">
    <meta property="og:image" content="https://eastfever.com/assets/og-image-final.webp?v=18">
    <meta property="og:locale" content="ko_KR">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css?v=18">
    <link rel="stylesheet" href="../css/blog.css?v=18">
    <link rel="stylesheet" href="../css/mobile.css?v=18" media="screen and (max-width: 767px)">
    <style>
        .about-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 10rem 2rem 4rem;
        }
        @media (max-width: 767px) {
            .about-container { padding-top: 8rem; }
        }
    </style>
</head>
<body>
    <header id="header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo"><a href="/" class="logo-link">EastFever</a></div>
                <nav class="nav-menu">
                    <a href="/" class="nav-link" id="nav-home">Home</a>
                    <a href="/about/" class="nav-link active" id="nav-about">About</a>
                    <a href="/blog.html" class="nav-link" id="nav-blog">Dev Story</a>
                </nav>
                <a href="mailto:mysticodoi@gmail.com" class="header-email">mysticodoi@gmail.com</a>
            </div>
            <div class="lang-selector">
                <button id="lang-btn" class="lang-btn">
                    <span class="lang-icon">🌐</span>
                    <span id="current-lang">한국어</span>
                    <span class="arrow">▾</span>
                </button>
                <ul id="lang-dropdown" class="lang-dropdown hidden">
                    <li data-lang="ko">한국어</li>
                    <li data-lang="en">English</li>
                    <li data-lang="ja">日本語</li>
                </ul>
            </div>
        </div>
    </header>

    <main class="about-container">
        <article id="about-content" class="markdown-body">
            <p>콘텐츠를 불러오는 중...</p>
        </article>
    </main>

    <footer id="footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="/terms.html" class="footer-link-text" id="footer-terms">이용약관</a>
                <span class="footer-divider">|</span>
                <a href="/privacy.html" class="footer-link-text" id="footer-privacy">개인정보처리방침</a>
            </div>
            <p class="copyright">&copy; 2026 EastFever. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../js/data-loader.js?v=18"></script>
    <script src="../js/i18n.js?v=18"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize i18n (Non-blocking for markdown)
            window.dataLoader.load().then(data => {
                if (data && window.efI18n) window.efI18n.updateUI();
            }).catch(err => console.error('i18n load failed:', err));

            // Markdown Loading and Rendering
            async function loadAboutContent() {
                try {
                    const response = await fetch('about.md?v=' + new Date().getTime());
                    if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                    let markdown = await response.text();
                    
                    // 정규식을 사용하여 Frontmatter 제거 (--- ... ---)
                    markdown = markdown.replace(/^---[\s\S]*?---/, '').trim();
                    
                    if (typeof marked !== 'undefined') {
                        document.getElementById('about-content').innerHTML = marked.parse(markdown);
                    } else {
                        console.error('marked.js is not loaded');
                    }
                } catch (error) {
                    console.error('Error fetching about.md:', error);
                    document.getElementById('about-content').innerHTML = '<p>콘텐츠를 로드하는 데 실패했습니다.</p>';
                }
            }

            loadAboutContent();
        });
    </script>
</body>
</html>
